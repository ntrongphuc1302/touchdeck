name: Build & Release APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      - name: Install deps
        working-directory: mobile
        run: flutter pub get

      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir output
          cp mobile/build/app/outputs/flutter-apk/app-release.apk output/TouchDeck.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/TouchDeck.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
